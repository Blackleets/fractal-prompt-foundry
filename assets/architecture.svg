  <rect x="92" y="726" width="408" height="42" rx="21" fill="#0B1220" stroke="#334155"/>
  <text x="296" y="752" fill="#E2E8F0" font-size="16" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif">What makes it attractive: clear concept + runnable artifacts + easy demo path</text>
